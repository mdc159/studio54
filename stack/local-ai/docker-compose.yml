name: studio54

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studio54-postgres}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - studio54_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  postgres-bootstrap:
    image: pgvector/pgvector:pg17
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-studio54-postgres}
      HONCHO_DATABASE_NAME: ${HONCHO_DATABASE_NAME:-honcho}
    entrypoint: /bin/sh
    command:
      - -ec
      - >
        until pg_isready -h postgres -U postgres; do sleep 1; done
        &&
        if ! psql -h postgres -U postgres -d postgres -Atqc "select 1 from pg_database where datname = '$${HONCHO_DATABASE_NAME}'" | grep -q 1; then
          createdb -h postgres -U postgres "$${HONCHO_DATABASE_NAME}";
        fi
        &&
        psql -h postgres -U postgres -d "$${HONCHO_DATABASE_NAME}" -c "CREATE EXTENSION IF NOT EXISTS vector;"

  broker:
    build:
      context: ../broker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BROKER_DATABASE_HOST: postgres
      BROKER_DATABASE_PORT: 5432
      BROKER_DATABASE_NAME: ${BROKER_DATABASE_NAME:-postgres}
      BROKER_DATABASE_USER: postgres
      BROKER_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-studio54-postgres}
      BROKER_SERVICE_NAME: studio54-broker
    ports:
      - "127.0.0.1:8090:8090"

  honcho-migrate:
    build:
      context: ../../modules/honcho
    restart: "no"
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
    environment: &honcho-env
      LOG_LEVEL: ${HONCHO_LOG_LEVEL:-INFO}
      NAMESPACE: ${HONCHO_NAMESPACE:-studio54}
      AUTH_USE_AUTH: ${HONCHO_AUTH_USE_AUTH:-false}
      DB_CONNECTION_URI: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-studio54-postgres}@postgres:5432/${HONCHO_DATABASE_NAME:-honcho}
      VECTOR_STORE_TYPE: pgvector
      VECTOR_STORE_MIGRATED: "false"
      LLM_OPENAI_COMPATIBLE_BASE_URL: ${HONCHO_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_OPENAI_COMPATIBLE_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_EMBEDDING_PROVIDER: ${HONCHO_EMBEDDING_PROVIDER:-openrouter}
      DERIVER_ENABLED: ${HONCHO_DERIVER_ENABLED:-true}
      DERIVER_PROVIDER: custom
      DERIVER_MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DIALECTIC_LEVELS__minimal__PROVIDER: custom
      DIALECTIC_LEVELS__minimal__MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DIALECTIC_LEVELS__low__PROVIDER: custom
      DIALECTIC_LEVELS__low__MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DIALECTIC_LEVELS__medium__PROVIDER: custom
      DIALECTIC_LEVELS__medium__MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DIALECTIC_LEVELS__high__PROVIDER: custom
      DIALECTIC_LEVELS__high__MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DIALECTIC_LEVELS__max__PROVIDER: custom
      DIALECTIC_LEVELS__max__MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      SUMMARY_PROVIDER: custom
      SUMMARY_MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DREAM_PROVIDER: custom
      DREAM_MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DREAM_DEDUCTION_MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
      DREAM_INDUCTION_MODEL: ${HONCHO_LLM_MODEL:-google/gemini-2.5-flash}
    command: python -c "import asyncio; from src.db import init_db; asyncio.run(init_db())"

  honcho-api:
    build:
      context: ../../modules/honcho
    restart: unless-stopped
    depends_on:
      honcho-migrate:
        condition: service_completed_successfully
    environment: *honcho-env
    ports:
      - "127.0.0.1:18000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  honcho-deriver:
    build:
      context: ../../modules/honcho
    restart: unless-stopped
    depends_on:
      honcho-migrate:
        condition: service_completed_successfully
    environment: *honcho-env
    command: python -m src.deriver

  paperclip:
    build:
      context: ../..
      dockerfile: modules/paperclip/Dockerfile
      args:
        USER_UID: ${PAPERCLIP_USER_UID:-1000}
        USER_GID: ${PAPERCLIP_USER_GID:-1000}
    restart: unless-stopped
    network_mode: host
    depends_on:
      broker:
        condition: service_started
      honcho-api:
        condition: service_healthy
    environment:
      HOST: 127.0.0.1
      PORT: 3100
      PAPERCLIP_INSTANCE_ID: ${PAPERCLIP_INSTANCE_ID:-default}
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-local_trusted}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      BETTER_AUTH_SECRET: ${PAPERCLIP_AUTH_SECRET:-paperclip-local-secret-studio54}
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: ${PAPERCLIP_AUTH_PUBLIC_BASE_URL:-}
      PAPERCLIP_ALLOWED_HOSTNAMES: ${PAPERCLIP_ALLOWED_HOSTNAMES:-}
      PAPERCLIP_BROKER_URL: http://127.0.0.1:8090
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://127.0.0.1:3100}
      PAPERCLIP_API_URL: ${PAPERCLIP_API_URL:-http://127.0.0.1:3100}
      PAPERCLIP_BROWSER_ORIGIN: ${PAPERCLIP_BROWSER_ORIGIN:-http://127.0.0.1:3100}
      OPENAI_API_BASE_URL: https://openrouter.ai/api/v1
      OPENAI_API_KEY: ${OPENROUTER_API_KEY:-}
      HONCHO_BASE_URL: http://127.0.0.1:18000
    volumes:
      - studio54_paperclip_data:/paperclip
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  open-webui:
    profiles: ["ui"]
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      OPENAI_API_BASE_URLS: https://openrouter.ai/api/v1
      OPENAI_API_KEYS: ${OPENROUTER_API_KEY:-}
      ENABLE_OPENAI_API: "true"
      DEFAULT_MODELS: ${OPEN_WEBUI_DEFAULT_MODEL:-google/gemini-2.5-flash}
    volumes:
      - studio54_open_webui_data:/app/backend/data

volumes:
  studio54_postgres_data:
  studio54_paperclip_data:
  studio54_open_webui_data:
