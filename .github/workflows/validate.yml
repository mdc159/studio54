name: Studio54 validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Doctor agent environment
        run: bash scripts/doctor-agent-env.sh
      - name: Validate repo
        run: bash scripts/validate-repo.sh
      - name: Agent evidence guard
        if: github.event_name == 'pull_request'
        run: python3 scripts/agent-evidence-guard.py --base-ref "${{ github.base_ref }}"
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio54-validation-artifacts
          path: .artifacts/agent-validation/
          if-no-files-found: warn
